{% extends "base.html" %}
{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 85vh;">
    <div class="card border-0 shadow-lg rounded-4 p-4" style="width: 450px;">
        <div class="text-center mb-4">
            <div class="bg-success bg-opacity-10 p-3 rounded-circle d-inline-block mb-2">
                <i class="bi bi-person-plus-fill text-success fs-2"></i>
            </div>
            <h3 class="fw-bold">Create Account</h3>
            <p class="text-muted small">Join the School Management System</p>
        </div>

        <form method="POST" novalidate>
            {% csrf_token %}

            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger x-small">{{ field.errors|first }}</div>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" class="btn btn-success w-100 py-2 fw-bold rounded-pill shadow-sm mt-3">
                Register Now
            </button>
        </form>

        <div class="mt-4 text-center border-top pt-3">
            <p class="mb-0 small text-muted">
                Already have an account? 
                <a href="{% url 'login_view' %}" class="text-success fw-bold text-decoration-none">Login here</a>
            </p>
        </div>
    </div>
</div>

<style>
    /* This ensures all Django form widgets get Bootstrap styling */
    input, select, textarea {
        display: block;
        width: 100%;
        padding: 0.375rem 0.75rem;
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.5;
        color: #212529;
        background-color: #fff;
        background-clip: padding-box;
        border: 1px solid #ced4da;
        border-radius: 0.375rem;
        transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;
    }
    input:focus {
        border-color: #198754;
        outline: 0;
        box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.25);
    }
    .x-small { font-size: 0.75rem; }
</style>

{% endblock %}
