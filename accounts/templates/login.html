{% extends "base.html" %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 85vh;">
    <div class="card border-0 shadow-lg rounded-4 p-4" style="width: 400px;">
        <div class="text-center mb-4">
            <div class="bg-primary bg-opacity-10 p-3 rounded-circle d-inline-block mb-2">
                <i class="bi bi-shield-lock-fill text-primary fs-2"></i>
            </div>
            <h3 class="fw-bold">Welcome Back</h3>
            <p class="text-muted small">Log in to your school account</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold rounded-pill shadow-sm mt-3">
                Login
            </button>
        </form>

        <div class="mt-4 text-center border-top pt-3">
            <p class="mb-0 small text-muted">
                Don't have an account? 
                <a href="{% url 'register_view' %}" class="text-primary fw-bold text-decoration-none">Register here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
