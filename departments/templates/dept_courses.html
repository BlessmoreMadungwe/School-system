{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex align-items-center mb-4 p-3 bg-white rounded shadow-sm border-start border-4 border-danger">
        <div class="bg-danger bg-opacity-10 p-3 rounded-circle me-3">
            <i class="bi bi-book-half text-danger fs-3"></i>
        </div>
        <div>
            <h3 class="fw-bold mb-0">Course Curriculum</h3>
            <p class="text-secondary mb-0 small">Syllabus and units for Computer Science</p>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">Course ID</th>
                        <th>Course Title</th>
                        <th>Credit units</th>
                        <th>Assigned Teacher</th>
                        <th class="text-center">Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="ps-4 fw-bold text-danger">CS101</td>
                        <td class="fw-medium">Intro to Programming</td>
                        <td>4 Units</td>
                        <td>Prof. Alex Rivera</td>
                        <td class="text-center"><span class="badge bg-success-subtle text-success">Active</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
