{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <nav aria-label="breadcrumb" class="mb-3">
                <a href="{% url 'departments_list' %}" class="text-decoration-none text-muted small">
                    <i class="bi bi-arrow-left"></i> Back to List
                </a>
            </nav>

            <div class="d-flex align-items-center mb-4">
                <div class="bg-primary text-white rounded-3 p-3 me-3 shadow-sm">
                    <i class="bi bi-pencil-square fs-3"></i>
                </div>
                <div>
                    <h2 class="fw-bold mb-0">Edit Department</h2>
                    <p class="text-muted mb-0">Update details for <strong>{{ department.name }}</strong></p>
                </div>
            </div>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Department Name</label>
                            {{ form.name }}
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold small">Short Code</label>
                                {{ form.code }}
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold small">Head of Dept (Optional)</label>
                                {{ form.head_of_dept }}
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Description</label>
                            {{ form.description }}
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary py-2 fw-bold shadow-sm">
                                Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
