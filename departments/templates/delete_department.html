{% extends "base.html" %}

{% block content %}
<div class="container-fluid py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-5 text-center">
                    <div class="display-1 text-danger mb-4">
                        <i class="bi bi-exclamation-octagon"></i>
                    </div>
                    <h2 class="fw-bold text-dark">Confirm Delete</h2>
                    <p class="text-muted mb-4">
                        Are you sure you want to delete <strong>{{ department.name }}</strong>? 
                        This action is permanent.
                    </p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex gap-3 justify-content-center">
                            <a href="{% url 'departments_list' %}" class="btn btn-light px-4 py-2 fw-bold">Cancel</a>
                            <button type="submit" class="btn btn-danger px-4 py-2 fw-bold shadow-sm">Delete Department</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
