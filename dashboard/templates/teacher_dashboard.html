{% extends "base.html" %}

{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
        <h2 class="h2">Teacher Dashboard</h2>
        <div class="btn-toolbar mb-2 mb-md-0">
            <button type="button" class="btn btn-sm btn-outline-primary">
                <i class="bi bi-plus-lg me-1"></i> New Material
            </button>
        </div>
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        
        <div class="col">
            <div class="card text-bg-primary border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center justify-content-between">
                    <div>
                        <h5 class="card-title opacity-75">My Classes</h5>
                        <p class="card-text display-6 fw-bold mb-0">3</p>
                        <small>Assigned this term</small>
                    </div>
                    <i class="bi bi-door-open fs-1 opacity-25"></i>
                </div>
            </div>
        </div>

        <div class="col">
            <div class="card text-bg-success border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center justify-content-between">
                    <div>
                        <h5 class="card-title opacity-75">Students</h5>
                        <p class="card-text display-6 fw-bold mb-0">80</p>
                        <small>Across all sections</small>
                    </div>
                    <i class="bi bi-people fs-1 opacity-25"></i>
                </div>
            </div>
        </div>

        <div class="col">
            <div class="card text-bg-warning border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center justify-content-between">
                    <div>
                        <h5 class="card-title opacity-75">Materials</h5>
                        <p class="card-text display-6 fw-bold mb-0">12</p>
                        <small>Files uploaded</small>
                    </div>
                    <i class="bi bi-file-earmark-arrow-up fs-1 opacity-25"></i>
                </div>
            </div>
        </div>

    </div>

    <div class="row mt-5">
        <div class="col-md-12">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0 fw-bold">Active Classes</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Class Name</th>
                                    <th>Schedule</th>
                                    <th>Students</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><strong>Mathematics 10A</strong></td>
                                    <td>Mon/Wed 09:00 AM</td>
                                    <td>28</td>
                                    <td class="text-end">
                                        <button class="btn btn-sm btn-primary">Attendance</button>
                                        <button class="btn btn-sm btn-outline-dark">Grades</button>
                                    </td>
                                </tr>
                                <tr>
                                    <td><strong>Physics 12B</strong></td>
                                    <td>Tue/Thu 11:00 AM</td>
                                    <td>25</td>
                                    <td class="text-end">
                                        <button class="btn btn-sm btn-primary">Attendance</button>
                                        <button class="btn btn-sm btn-outline-dark">Grades</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
