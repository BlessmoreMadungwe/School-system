{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
        <h2 class="h2">Admin Dashboard</h2>
    </div>

    <div class="row g-4">
        <div class="col-12 col-sm-6 col-xl-3">
            <div class="card text-bg-primary h-100 border-0 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title opacity-75">Total Students</h5>
                    <p class="card-text display-6 fw-bold">120</p>
                </div>
            </div>
        </div>

        <div class="col-12 col-sm-6 col-xl-3">
            <div class="card text-bg-success h-100 border-0 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title opacity-75">Total Teachers</h5>
                    <p class="card-text display-6 fw-bold">25</p>
                </div>
            </div>
        </div>

        <div class="col-12 col-sm-6 col-xl-3">
            <div class="card text-bg-warning h-100 border-0 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title opacity-75">Total Classes</h5>
                    <p class="card-text display-6 fw-bold">12</p>
                </div>
            </div>
        </div>

        <div class="col-12 col-sm-6 col-xl-3">
            <div class="card text-bg-danger h-100 border-0 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title opacity-75">Total Exams</h5>
                    <p class="card-text display-6 fw-bold">8</p>
                </div>
            </div>
        </div>
    </div>

    <div class="card mt-5 shadow-sm border-0">
        <div class="card-header bg-white py-3">
            <h5 class="mb-0">Recent Activities</h5>
        </div>
        <div class="card-body p-0">
            <ul class="list-group list-group-flush">
                <li class="list-group-item d-flex align-items-center">
                    <i class="bi bi-person-plus-fill text-primary me-3"></i>
                    New student registered: <span class="ms-1 fw-bold">Alex Johnson</span>
                </li>
                <li class="list-group-item d-flex align-items-center">
                    <i class="bi bi-file-earmark-text-fill text-success me-3"></i>
                    Grade report updated for <span class="ms-1 fw-bold">Mathematics</span>
                </li>
                <li class="list-group-item d-flex align-items-center">
                    <i class="bi bi-calendar-event-fill text-warning me-3"></i>
                    Final exam schedule published
                </li>
            </ul>
        </div>
    </div>
</div>
{% endblock %}
