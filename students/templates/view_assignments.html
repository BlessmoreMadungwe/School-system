{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Assignments</h2>
        <a href="#" class="btn btn-outline-primary btn-sm">Archive</a>
    </div>
    
    <div class="row row-cols-1 row-cols-md-2 g-4">
        <div class="col">
            <div class="card border-0 shadow-sm h-100 border-start border-warning border-4">
                <div class="card-body">
                    <h5 class="card-title">Science Project: Solar System</h5>
                    <p class="text-muted small">Subject: Physics | Due: Oct 15</p>
                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <span class="badge bg-warning text-dark">Pending</span>
                        <a href="#" class="btn btn-sm btn-primary">Upload Solution</a>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="col">
            <div class="card border-0 shadow-sm h-100 border-start border-success border-4">
                <div class="card-body">
                    <h5 class="card-title">Algebra Workbook Ch. 4</h5>
                    <p class="text-muted small">Subject: Math | Submitted: Oct 10</p>
                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <span class="badge bg-success">Submitted</span>
                        <button class="btn btn-sm btn-outline-secondary" disabled>Edit</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
