{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <h2 class="mb-4">Course Registration</h2>
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <table class="table align-middle">
                    <thead class="table-light">
                        <tr>
                            <th style="width: 50px;">Select</th>
                            <th>Course Name</th>
                            <th>Teacher</th>
                            <th>Schedule</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input type="checkbox" class="form-check-input"></td>
                            <td><strong>Advanced Mathematics</strong></td>
                            <td>Dr. Smith</td>
                            <td>Mon/Wed 09:00 AM</td>
                        </tr>
                        <tr>
                            <td><input type="checkbox" class="form-check-input"></td>
                            <td><strong>Physics II</strong></td>
                            <td>Prof. Johnson</td>
                            <td>Tue/Thu 11:00 AM</td>
                        </tr>
                    </tbody>
                </table>
                <button type="submit" class="btn btn-primary px-4 mt-3">Register Selected Courses</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
