{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm rounded-4 p-4">
                <h4 class="fw-bold mb-3">Assign Teacher</h4>
                <p class="text-muted small">Select a faculty member to lead <strong>{{ subject.name }}</strong></p>

                <form method="POST">
                    {% csrf_token %}
                    <select name="teacher_id" class="form-select mb-4">
                        {% for teacher in staff_members %}
                        <option value="{{ teacher.id }}">
                            {{ teacher.user.get_full_name }}
                        </option>
                        {% endfor %}
                    </select>
                    <button type="submit" class="btn btn-danger w-100">Confirm Assignment</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
